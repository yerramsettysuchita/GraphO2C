services:
  - type: web
    name: grapho2c
    runtime: python
    # plan: starter           # Upgrade in Render UI when billing is set up
    rootDir: backend
    buildCommand: >
      pip install -r requirements.txt &&
      echo "=== Building frontend ===" &&
      cd ../frontend &&
      npm ci &&
      VITE_API_KEY=$GRAPHO2C_API_KEY npm run build &&
      echo "=== frontend-dist contents ===" &&
      ls -lh ../frontend-dist/ &&
      ls -lh ../frontend-dist/assets/ || echo "No assets dir"
    startCommand: python main.py
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard — never committed
      - key: GRAPHO2C_API_KEY
        sync: false          # generate: python -c "import secrets; print(secrets.token_urlsafe(32))"
      - key: SENTRY_DSN
        sync: false          # get from sentry.io → New Project → Python → FastAPI
      - key: ENVIRONMENT
        value: production
      - key: RENDER_EXTERNAL_URL
        value: https://grapho2c.onrender.com
      - key: PORT
        value: 10000
